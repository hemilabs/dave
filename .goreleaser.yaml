# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

project_name: "dave"
report_sizes: true

before:
  hooks:
    - "go mod tidy"
    - "go mod download"
    - "go mod verify"

# gomod:
#   # Proxy the module from proxy.golang.org, making the builds verifiable.
#   proxy: true

builds:
  # dave
  - id: "dave"
    binary: "dave"
    main: "./cmd/dave/"
    env: ["CGO_ENABLED=0", "GOGC=off"]
    ldflags:
      - "-s -w"
    flags: ["-trimpath"]
    goos:
      - "linux"
      - "darwin"
      - "openbsd"
    goarch: ["amd64", "arm64"]

archives:
  - format: "tar.gz"
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    wrap_in_directory: true
    files:
      - "README*"
      - "LICENSE*"

# Creates checksum file.
checksum:
  name_template: "{{ .ProjectName }}_v{{ .Version }}_checksums.txt"
  algorithm: "sha256"

# Creates source tarball.
source:
  enabled: true
  name_template: "{{ .ProjectName }}_v{{ .Version }}_sources"
  format: "tar.gz"

# Creates SBOMs for all archives and the source tarball.
sboms:
  - id: "archive"
    artifacts: "archive"
  - id: "source"
    artifacts: "source"

# Signs the checksum file, which includes checksums for all files (including sboms).
#signs:
#  - cmd: "cosign"
#    certificate: "${artifact}.pem"
#    args:
#      - "sign-blob"
#      - "--output-certificate=${certificate}"
#      - "--output-signature=${signature}"
#      - "${artifact}"
#      - "--yes"
#    artifacts: "checksum"
#    output: true

# Creates Docker images:
#  - dave: linux/amd64, linux/arm64
dockers:
  # dave amd64
  - id: "dave-amd64"
    goos: "linux"
    goarch: "amd64"
    dockerfile: ".goreleaser.Dockerfile"
    use: "buildx"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-amd64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=VCS_REF={{ .FullCommit }}"
      - "--build-arg=BUILD_DATE={{ .Date }}"

  # dave arm64
  - id: "dave-arm64"
    goos: "linux"
    goarch: "arm64"
    dockerfile: ".goreleaser.Dockerfile"
    use: "buildx"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-arm64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=VCS_REF={{ .FullCommit }}"
      - "--build-arg=BUILD_DATE={{ .Date }}"

# Creates Docker manifests for each image containing the images for each
# architecture.
docker_manifests:
  # dave - Docker Hub
  - name_template: "hemilabs/dave:latest"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-amd64"
      - "hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "hemilabs/dave:{{ .Major }}"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-amd64"
      - "hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "hemilabs/dave:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-amd64"
      - "hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "hemilabs/dave:{{ .Version }}"
    image_templates:
      - "hemilabs/dave:{{ .Version }}-amd64"
      - "hemilabs/dave:{{ .Version }}-arm64"

  # dave - GitHub Container Registry
  - name_template: "ghcr.io/hemilabs/dave:latest"
    image_templates:
      - "ghcr.io/hemilabs/dave:{{ .Version }}-amd64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "ghcr.io/hemilabs/dave:{{ .Major }}"
    image_templates:
      - "ghcr.io/hemilabs/dave:{{ .Version }}-amd64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "ghcr.io/hemilabs/dave:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/hemilabs/dave:{{ .Version }}-amd64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-arm64"
  - name_template: "ghcr.io/hemilabs/dave:{{ .Version }}"
    image_templates:
      - "ghcr.io/hemilabs/dave:{{ .Version }}-amd64"
      - "ghcr.io/hemilabs/dave:{{ .Version }}-arm64"

# Signs Docker images and manifests.
#docker_signs:
#  - cmd: "cosign"
#    args: ["sign", "${artifact}", "--yes"]
#    artifacts: "all"

# Snapshot version settings.
snapshot:
  version_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

# Generates the changelog.
changelog:
  use: "github-native"

# Creates a GitHub release.
release:
  github:
    owner: "hemilabs"
    name: "dave"
  replace_existing_draft: true
  prerelease: "auto"
  make_latest: true
  mode: "keep-existing"
