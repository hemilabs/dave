# GitHub Actions workflow to lint, build and test.
name: "Go"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: "go-${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

env:
  # renovate: datasource=github-releases depName=golangci/golangci-lint versioning=semver
  GOLANGCI_LINT_VERSION: "v2.12.2"
  # renovate: datasource=github-releases depName=joshuasing/golicenser versioning=semver
  GOLICENSER_VERSION: "v0.3.1"

permissions: {}

jobs:
  lint:
    name: "Lint"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: "Setup Go"
        id: go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: "golangci-lint"
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"

      - name: "golangci-lint fmt"
        run: golangci-lint fmt --diff ./...

      - name: "Cache golicenser"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: "/home/runner/go/bin/golicenser"
          key: "${{ runner.os }}-golicenser-${{ env.GOLICENSER_VERSION }}-go${{ steps.go.outputs.go-version }}"

      - name: "golicenser"
        env:
          LICENSE_HEADER: |
            Copyright (c) {{.year}} {{.author}}
            Use of this source code is governed by the MIT License,
            which can be found in the LICENSE file.
        run: |
          if ! (command -v 'golicenser' >/dev/null); then
            go install github.com/joshuasing/golicenser/cmd/golicenser@$GOLICENSER_VERSION
          fi
          golicenser -tmpl="$LICENSE_HEADER" -author="Hemi Labs, Inc." -year-mode=git-range ./...

  build:
    name: "Build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: "Setup Go"
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        run: make go-deps

      - name: "make build"
        run: make build

  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: "Setup Go"
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        run: make go-deps

      - name: "make test"
        run: make test

  test-race:
    name: "Test (race)"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: "Setup Go"
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        run: make go-deps

      - name: "make race"
        run: make race
